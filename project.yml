name: RecipeAI

options:
  bundleIdPrefix: com.hydorgen
  deploymentTarget:
    iOS: "17.0"

targets:
  RecipeAI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: Sources
    dependencies:
      - package: GoogleGenerativeAI
    settings:
      INFOPLIST_FILE: Sources/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.hydorgen.foodrecipe
      DEVELOPMENT_TEAM: MHVVU6XHCC
      CODE_SIGN_IDENTITY: Apple Development
    info:
      path: Sources/Info.plist
      properties:
        NSCameraUsageDescription: "음식 사진 촬영을 위해 카메라가 필요합니다"
        NSPhotoLibraryUsageDescription: "음식 사진 선택을 위해 앨범 접근이 필요합니다"
        GEMINI_API_KEY: "AIzaSyBjUM-wAcISzDXeBwIYm1CfgHNn9aiZiVU"

schemes:
  RecipeAI:
    build:
      targets:
        RecipeAI: all
    run:
      config: Debug
      environmentVariables:
        - variable: GEMINI_API_KEY
          value: $(GEMINI_API_KEY)
          isEnabled: true

packages:
  GoogleGenerativeAI:
    url: https://github.com/google/generative-ai-swift
    from: 0.5.0
